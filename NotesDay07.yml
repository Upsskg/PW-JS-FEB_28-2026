Difference between slice() and splice()

slice(start, endIndex)
arr.slice(1, 4)


Means:

Start at index 1, stop before index 4

splice(start, deleteCount)
arr.splice(1, 3)


Means:

Start at index 1, remove 3 elements

So:

["a","b","c","d","e"]
     ↑ start=1

remove 3 → b, c, d


Remaining array:

["a","e"]

Side-by-side
Method	Second argument means
slice(1,4)	Stop at index 4 (exclusive)
splice(1,3)	Remove 3 elements

 Interview line

“slice() uses start and end index, but splice() uses start index and delete count.”

