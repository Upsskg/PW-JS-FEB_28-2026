Frames :
-------

Definition: An HTML document embedded inside another document using an <iframe> tag. Playwright allows direct interaction with elements inside frames.

Usage: Useful for automating pages that load content inside frames or nested frames.

Syntax:

page.frames()-> frames() method helps to get the collection of frames that is present in a webpage.

page.frame({ name | url }) → Gets the frame object to interact with.

------------------------------------------------------------------------------------------------

Modern Playwright frame interaction method:
--------------------------------------------

page.frameLocator(selector) → Locates elements inside a frame (recommended).

-------------------------------------------------------------------------------------------

| Feature       | `frame()`     | `frameLocator()` |
| ------------- | ------------- | ---------------- |
| Return type   | Frame or null | Locator-like     |
| Auto wait     | ❌ No          | ✅ Yes            |
| Nested frames |   Hard       | ✅ Easy           |
| Stability     | ❌ Less        | ✅ More           |
| Recommended   | ❌ Old style   | ✅ Best practice  |



---------------------------------------------------------

Used in legacy Application :
-----------------
page.frame({ name | url | index }) → Gets the frame object to interact with.

1. ?. (Optional Chaining ⭐)

This is the important part

frameURL?.locator("")
?. means:
👉 “Only continue if frameURL is NOT null or undefined”
Without ?.
frameURL.locator("")

❌ If frameURL is null → error (crash)

With ?.
frameURL?.locator("")

✅ If frameURL is null → it safely skips (no error)

