
# 📘 GitHub Repository Workflow Guide

## 1. Creating a New Repository from Command Line


# Initialize local repository
git init

# Rename branch to main
git branch -M main

# Add remote GitHub repo
git remote add origin 


# Stage all files and commit
git add .
git commit -m "Initial commit"

# Push changes to GitHub
git push -u origin main


---

## 2. Cloning or Pulling Files from GitHub

### 🔹 First time (clone entire repo)


git clone https://github.com/testleaftrainings/PW-JS-JAN-26.git


### 🔹 Already cloned (get latest changes)


git pull origin main


### 🔹 Pull only one specific file (less common)


git fetch origin main
git checkout origin/main -- tests/01-launchBrowser.spec.ts


---

## 3. Pushing Files to GitHub

### 🔹 Push a single file

git add tests/filename.spec.ts
git commit -m "Add test for filename"
git push origin main

### 🔹 Push multiple specific files

git add tests/filename1.spec.ts tests/filename2.spec.ts
git commit -m "Update tests filename1 and filename2"
git push origin main

### 🔹 Push all changes in a specific folder

git add tests/
git commit -m "Commit all changes inside tests folder"
git push origin main


### 🔹 Push everything inside `tests/` but not other files

(same as above)

git add tests/
git commit -m "Commit all changes inside tests folder"
git push origin main

---

## 4. Typical Update Workflow

If you edited a file in VS Code (example: `03-page-fixture.spec.ts`):

# Step 1: Stage the file
git add tests/03-page-fixture.spec.ts

# Step 2: Commit changes
git commit -m "Update test to log page title in 03-page-fixture.spec.ts"

# Step 3: Push to GitHub
git push origin main

---

✅ **Tips:**

* Always run `git status` to check staged/unstaged changes.
* Use meaningful commit messages.
* Use `git pull origin main` before pushing to avoid conflicts.



---

5. Feature Branch & Pull Request Workflow

🔹 Why use a feature branch?

Keeps main stable
Enables code review
Prevents breaking production code

Standard practice in teams

 Step 1: Create a Feature Branch

# Make sure you are on main and up-to-date
git checkout main
git pull origin main

# Create a new branch
git checkout -b feature/login-test

👉 Naming convention:

feature/... → new feature
bugfix/... → bug fix
hotfix/... → urgent fix

✍️ Step 2: Work on Your Changes

git add .
git commit -m "Add login test scenario"

🚀 Step 3: Push Feature Branch to GitHub

git push origin feature/login-test

👉 This creates the branch in GitHub.

🔁 Step 4: Create Pull Request (PR)

Go to your GitHub repository:
👉 Example: https://github.com/<your-username>/<repo-name>

Then:

Click "Compare & pull request"

Ensure:
Base branch → main

Compare branch → feature/login-test

Add:
Title
Description of changes
Click Create Pull Request

 Step 5: Code Review (Team Step)

Team members review your code
They may:

Approve ✅
Request changes 🔄

🔀 Step 6: Merge Pull Request

After approval:

Click Merge Pull Request
Choose:
Create a merge commit (default)
OR Squash and merge (clean history)

Step 7: Delete Feature Branch (Optional but Recommended)
# Delete locally
git branch -d feature/login-test

# Delete from remote
git push origin --delete feature/login-test

Step 8: Sync Local Main After Merge
git checkout main
git pull origin main

Best Practices :

Never work directly on main
Always pull latest changes before creating a branch
Keep PRs small and focused
Write clear PR descriptions
Use meaningful branch names