Custom Fixture :

In Playwright, a custom fixture is used to create and manage reusable objects before a test runs, and automatically provide them inside the test function.

Here customFixtures.ts is extending the default Playwright test and injecting Page Object Model (POM) classes like:
LoginPage
WelcomePage
HomePage
LeadPage
CreateLeadPage
ViewLeadPage

So instead of creating objects manually inside every test like:
const login = new LoginPage(page)

You are centralizing object creation in one place and reusing it across all tests.

What custom fixture does in your project:

1. Extends Playwright baseTest
   import { test as baseTest } from "@playwright/test"
   export const test = baseTest.extend<myFixtures>({...})

2. Creates POM objects
   Example:
   lopfix: async ({ page }, use) => {
   const lopobj = new LoginPage(page)
   await use(lopobj)
   }

3. Injects them into test automatically
   So in your spec file you can directly use:

   test("Create Lead Verification", async ({ lopfix, wp, hp, lp, clp, vp }) => {
   await lopfix.loadurl(...)
   })

Problem it solves

Without fixture:
* You must create new object in every test
* Code duplication
* Hard to maintain

With custom fixture:
* Centralized object creation
* Clean test methods
* Better scalability
* Reusable architecture
* Follows Hybrid Framework structure (BDD + POM + Fixture driven execution)

Example

Without fixture:
test("sample", async ({ page }) => {
const login = new LoginPage(page)
await login.loadurl("url")
})

With fixture:
test("sample", async ({ lopfix }) => {
await lopfix.loadurl("url")
})

So in simple words:

Custom fixture = Dependency injection mechanism in Playwright
It automatically creates and supplies reusable objects to test methods.




