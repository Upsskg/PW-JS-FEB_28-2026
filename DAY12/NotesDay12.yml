Schema Validation in POSTMAN :

const schema = {
    type: "object",
    properties: {
        access_token: { type: "string" },
        instance_url: { type: "string" },
        id: { type: "string" },
        token_type: { type: "string" },
        issued_at: { type: "string" },
        signature: { type: "string" }
    },
    required: ["access_token", "instance_url", "id", "token_type", "issued_at", "signature"]
};

// 2. Test the response against the schema
pm.test("Response matches schema", function () {
    pm.response.to.have.jsonSchema(schema);
});

JSON Schema Validation
🔍 What exactly is happening here?

You are defining a JSON Schema (a standard format) and validating your API response against it.

👉 So the correct term is:

“Response Body JSON Schema Validation”

 Simple Explanation

You are not validating values
You are validating:
Structure (object)
Data types (string, number, etc.)
Required fields

🎯 One-line Answer (Very Important)

👉
“This is JSON Schema validation used to validate API response structure, data types, and required fields.”

🧩 Breakdown of Your Schema
type: "object"

✔ Response must be an object

properties: { ... }

✔ Defines expected fields and their types

required: [...]

✔ Ensures mandatory fields are present

-------------------------------
Schema Validation in Playwright :

import { expect, test } from "@playwright/test";
import Ajv from "ajv";

let token: any
let inst_url: any
let tokenType: any
let id: any

const ajv = new Ajv();

const schema = {
    type: "object",
    properties: {
        access_token: { type: "string" },
        instance_url: { type: "string" },
        id: { type: "string" },
        token_type: { type: "string" },
        issued_at: { type: "string" },
        signature: { type: "string" }
    },
    required: ["access_token", "instance_url", "id", "token_type", "issued_at", "signature"]
};

test.describe.serial(`Salesforce API testing`, async () => {

    test(`Generate Token`, async ({ request }) => {

        const response = await request.post(`https://login.salesforce.com/services/oauth2/token`, {
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            form: {
                client_id: "xxx",
                client_secret: "xxx",
                username: "xxx",
                password: "xxx",
                grant_type: "password"
            }
        });

        const responseBody = await response.json();
        console.log(responseBody);

        // ✅ Schema Validation (Equivalent to Postman)
        const validate = ajv.compile(schema);
        const valid = validate(responseBody);

        expect(valid).toBeTruthy();

        if (!valid) {
            console.log(validate.errors);
        }

        token = responseBody.access_token;
        inst_url = responseBody.instance_url;
        tokenType = responseBody.token_type;
    });
});




