# Data Parameterization with JSON

---

### **Definition**

Feeding test data from external JSON files instead of hardcoding values.
Useful for **data-driven testing**.


--------------------------------------------
const date = new Date();

const dateTime = date
  .toLocaleString('en-GB', { hour12: false })
  .replace(/\//g, "-")
  .replace(/:/g, "-")
  .replace(/, /g, "_");

console.log(dateTime);

🧩 Step-by-step Explanation for implementing date and time :

🔹 Step 1: Get current date & time
const date = new Date();

👉 This creates a Date object with current system date and time

🔹 Step 2: Convert it to readable format
date.toLocaleString('en-GB', { hour12: false })

👉 This gives date + time in a readable format

Example:

28/03/2026, 14:45:30
'en-GB' → ensures format is DD/MM/YYYY
hour12: false → gives 24-hour format (no AM/PM)

🔹 Step 3: Make it file-name safe
.replace(/\//g, "-")
.replace(/:/g, "-")
.replace(/, /g, "_");

👉 Why we do this?

Because file names cannot safely contain:

/ (used in paths)
: (invalid in Windows file names)
🔄 After replacements:
28-03-2026_14-45-30

🔹 Step 4: Store in variable
const dateTime = ...

👉 Now we have a clean timestamp string

🔹 Step 5: Use it in file name
await fDown.saveAs(
  path.join(__dirname, `../../Data/Absolute_${dateTime}.png`)
);

👉 Final file name becomes:

Absolute_28-03-2026_14-45-30.png





